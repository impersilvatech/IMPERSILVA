<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sem Ligação — IMPERSILVA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #161618; --charcoal: #242428;
      --red: #d62828; --blue-lt: #3b6ef0;
      --white: #ffffff; --gray: #888896;
      --divider: rgba(255,255,255,0.07);
    }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark); color: var(--white);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
      position: relative; overflow: hidden;
    }
    /* Background glow */
    body::before {
      content: '';
      position: fixed; left: -200px; bottom: -100px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(214,40,40,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; right: -150px; top: -150px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      background: var(--charcoal);
      border: 1px solid var(--divider);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px; width: 100%;
      position: relative; z-index: 1;
    }

    /* Icon */
    .offline-icon {
      width: 80px; height: 80px; margin: 0 auto 1.8rem;
      background: rgba(214,40,40,0.1);
      border: 1px solid rgba(214,40,40,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }

    /* Logo */
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 2rem;
      color: rgba(255,255,255,0.3);
    }
    .logo .r { color: var(--red); }
    .logo .b { color: var(--blue-lt); }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
    }
    h1 .r { color: var(--red); }

    p {
      font-size: 0.93rem; font-weight: 300;
      color: var(--gray); line-height: 1.75;
      margin-bottom: 2rem;
    }

    .divider {
      height: 1px; background: var(--divider); margin: 1.5rem 0;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--red); color: white;
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.8rem 1.8rem; border-radius: 5px;
      border: none; cursor: pointer; text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { background: #e84040; transform: translateY(-1px); }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem; color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">IMPERSIL<span class="r">V</span><span class="b">Λ</span></div>

    <div class="offline-icon">📡</div>

    <h1>Sem <span class="r">Ligação</span></h1>
    <p>
      Parece que não tem conexão à internet neste momento.<br>
      Verifique a sua rede e tente novamente.
    </p>

    <div class="divider"></div>

    <button class="btn" onclick="window.location.reload()">
      ↺ Tentar novamente
    </button>

    <p class="hint">As páginas visitadas anteriormente podem estar disponíveis offline.</p>
  </div>

  <script>
    /* Redireciona para home quando a ligação voltar */
    window.addEventListener('online', () => {
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
