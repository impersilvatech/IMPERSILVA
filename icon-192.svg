<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fundo -->
  <rect width="192" height="192" rx="24" fill="#0a1628"/>

  <!-- Sombra suave -->
  <filter id="shadow">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
  </filter>

  <!-- Corpo principal do "W" - cinzento escuro -->
  <path d="M 48 48 L 66 96 L 96 56 L 126 96 L 144 48 L 148 56 L 126 104 L 96 64 L 66 104 L 44 56 Z"
        fill="#3d4046" filter="url(#shadow)"/>

  <!-- Ponta vermelha (esquerda) -->
  <path d="M 48 48 L 66 96 L 54 96 L 44 56 Z"
        fill="#d62828" filter="url(#shadow)"/>

  <!-- Ponta azul (direita) -->
  <path d="M 144 48 L 126 96 L 138 96 L 148 56 Z"
        fill="#3b6ef0" filter="url(#shadow)"/>

  <!-- Brilho suave no topo -->
  <path d="M 48 48 L 66 96 L 54 96 L 44 56 Z"
        fill="rgba(255,255,255,0.15)" />
  <path d="M 144 48 L 126 96 L 138 96 L 148 56 Z"
        fill="rgba(255,255,255,0.15)" />
</svg>
