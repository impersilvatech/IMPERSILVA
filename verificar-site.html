<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Área de Cliente — IMPERSILVA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--card:#1a1a1c;--card2:#242428;
  --red:#d62828;--blue:#1d4ed8;--blu2:#3b6ef0;
  --grn:#22c55e;--amb:#f59e0b;
  --wh:#fff;--gr:#888896;--gr2:#c0c0cc;
  --div:rgba(255,255,255,.07);--bot:60px;--top:52px;
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--wh)}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--div)}

#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  background:var(--bg);background-image:radial-gradient(ellipse at 20% 40%,rgba(214,40,40,.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(29,78,216,.05) 0%,transparent 50%);}
.auth-box{background:var(--card);border:1px solid var(--div);border-radius:16px;width:100%;max-width:360px;overflow:hidden}
.auth-head{padding:1.8rem 1.5rem 1.2rem;text-align:center;border-bottom:1px solid var(--div)}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;text-transform:uppercase;letter-spacing:.06em;line-height:1}
.auth-logo .r{color:var(--red)}.auth-logo .b{color:var(--blu2)}
.auth-sub{font-size:.55rem;letter-spacing:.22em;color:var(--gr);text-transform:uppercase;margin-top:.3rem}
.auth-tabs{display:flex;border-bottom:1px solid var(--div)}
.auth-tab{flex:1;padding:.85rem;text-align:center;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gr);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.auth-tab.on{color:var(--wh);border-bottom-color:var(--red)}
.auth-body{padding:1.4rem 1.5rem 1.8rem}
.auth-form{display:none}.auth-form.on{display:block}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.85rem 1rem;color:var(--wh);font-size:.95rem;outline:none;transition:border-color .2s;-webkit-appearance:none;display:block;margin-bottom:.75rem}
.fi:focus{border-color:var(--red)}
.fi::placeholder{color:rgba(255,255,255,.2)}
.fi-label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gr2);margin-bottom:.35rem}
.auth-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:1rem;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;position:relative;overflow:hidden;transition:background .15s}
.auth-btn:active{background:#b91c1c}
.auth-err{color:var(--red);font-size:.76rem;margin-top:.5rem;text-align:center;min-height:1.2rem}
.auth-help{font-size:.72rem;color:var(--gr);text-align:center;margin-top:.9rem;line-height:1.6}
.auth-help a{color:var(--blu2)}
.or-div{display:flex;align-items:center;gap:.75rem;margin:.8rem 0;color:var(--gr);font-size:.72rem}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--div)}

#app{display:none;min-height:100vh;padding-bottom:calc(var(--bot)+.5rem)}
.hdr{position:sticky;top:0;background:rgba(14,14,15,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--div);z-index:100;padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between}
.hlogo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;text-transform:uppercase;letter-spacing:.04em;line-height:1}
.hlogo .r{color:var(--red)}.hlogo .b{color:var(--blu2)}
.hlogo-s{font-size:.38rem;letter-spacing:.18em;color:var(--gr);text-transform:uppercase;display:block}
.hname{font-size:.72rem;color:var(--gr2);font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hnotif{position:relative;background:none;border:none;color:var(--gr);font-size:1rem;cursor:pointer;padding:.3rem}
.hnotif-dot{position:absolute;top:2px;right:2px;width:7px;height:7px;background:var(--red);border-radius:50%;display:none}

.bn{position:fixed;bottom:0;left:0;right:0;height:var(--bot);background:rgba(14,14,15,.97);border-top:1px solid var(--div);display:flex;z-index:100}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--gr);font-size:.45rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-top:2px solid transparent;-webkit-tap-highlight-color:transparent;position:relative;transition:color .15s}
.bni.on{color:var(--wh);border-top-color:var(--red)}
.bni i{font-size:1.1rem}
.bni-dot{position:absolute;top:6px;right:calc(50% - 16px);width:7px;height:7px;background:var(--red);border-radius:50%;display:none}

.mc{padding:1rem}
.ph{padding:.7rem 0 1rem;border-bottom:1px solid var(--div);margin-bottom:1rem}
.pt{font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:900;text-transform:uppercase;letter-spacing:.03em}
.pt .r{color:var(--red)}.pt .b{color:var(--blu2)}
.ps{font-size:.73rem;color:var(--gr);margin-top:.15rem}

.card{background:var(--card);border:1px solid var(--div);border-radius:12px;padding:1rem;margin-bottom:1rem}
.ct{font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gr);margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid var(--div);display:flex;align-items:center;gap:.5rem}

.hero-prog{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:1.2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.hero-prog::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--red),var(--blu2))}
.hp-nome{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.1rem}
.hp-neg{font-size:.73rem;color:var(--gr);margin-bottom:.8rem}
.prog-bar{background:var(--div);border-radius:4px;height:7px;overflow:hidden;margin:.5rem 0}
.prog-fill{height:100%;background:linear-gradient(to right,var(--red),var(--blu2));border-radius:4px;transition:width 1.2s ease}
.prog-meta{display:flex;align-items:center;justify-content:space-between;font-size:.7rem;color:var(--gr)}
.prog-pct{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;line-height:1}
.e-badge{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border-radius:50px}
.e-prog{background:rgba(29,78,216,.12);color:var(--blu2);border:1px solid rgba(29,78,216,.3)}
.e-rev{background:rgba(245,158,11,.12);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
.e-ok{background:rgba(34,197,94,.1);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.e-pau{background:rgba(255,255,255,.05);color:var(--gr);border:1px solid var(--div)}

.etapa{display:flex;align-items:center;gap:.7rem;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.etapa:last-child{border-bottom:none}
.etapa-ic{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem}
.ok-ic{background:rgba(34,197,94,.15);color:var(--grn)}
.cur-ic{background:rgba(29,78,216,.15);color:var(--blu2)}
.pend-ic{background:rgba(255,255,255,.05);color:var(--gr)}
.etapa-nome{font-size:.82rem;font-weight:500;flex:1}
.etapa-nome.ok{color:var(--gr);text-decoration:line-through}
.etapa-nome.cur{color:var(--wh);font-weight:700}
.etapa-data{font-size:.63rem;color:var(--gr)}

.notif{background:rgba(255,255,255,.03);border:1px solid var(--div);border-radius:10px;padding:.85rem;margin-bottom:.6rem;cursor:pointer;transition:border-color .2s}
.notif.nao-lida{border-left:3px solid var(--red)}
.notif-top{display:flex;align-items:center;gap:.6rem}
.notif-titulo{font-weight:600;font-size:.85rem;flex:1}
.notif-date{font-size:.65rem;color:rgba(255,255,255,.3)}
.notif-msg{font-size:.78rem;color:var(--gr);margin-top:.35rem;line-height:1.5}
.nt-info{color:var(--blu2)}.nt-sucesso{color:var(--grn)}.nt-aviso{color:var(--amb)}.nt-pagamento{color:var(--amb)}

.fin-item{background:rgba(255,255,255,.03);border:1px solid var(--div);border-radius:10px;padding:.85rem;margin-bottom:.6rem}
.fin-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.fin-desc{font-weight:600;font-size:.85rem}
.fin-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;white-space:nowrap}
.fin-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;align-items:center}

.msg-wrap{display:flex;flex-direction:column;gap:.6rem}
.msg{padding:.7rem .9rem;border-radius:10px;max-width:85%;font-size:.82rem;line-height:1.5}
.msg.cli{background:rgba(29,78,216,.15);border:1px solid rgba(29,78,216,.2);align-self:flex-end;margin-left:auto}
.msg.emp{background:rgba(255,255,255,.05);border:1px solid var(--div)}
.msg-meta{font-size:.6rem;color:var(--gr);margin-top:.25rem}

.ticket{background:rgba(255,255,255,.03);border:1px solid var(--div);border-radius:10px;padding:.85rem;margin-bottom:.6rem;cursor:pointer}
.ticket.aberto{border-left:3px solid var(--red)}
.ticket-sub{font-weight:600;font-size:.85rem;flex:1}
.ticket-body{display:none;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--div);font-size:.8rem;line-height:1.6;color:var(--gr2)}
.ticket.open .ticket-body{display:block}

.doc-item{display:flex;align-items:center;gap:.75rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.doc-item:last-child{border-bottom:none}
.doc-ic{width:36px;height:36px;border-radius:8px;background:rgba(29,78,216,.12);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--blu2);flex-shrink:0}

.pf-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:.75rem}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.75rem 1.1rem;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;text-decoration:none;position:relative;overflow:hidden;transition:opacity .15s}
.btn:active{opacity:.85}
.bfull{width:100%}
.bred{background:var(--red);color:#fff}
.bblue{background:var(--blue);color:#fff}
.bgh{background:rgba(255,255,255,.05);color:var(--gr2);border:1px solid rgba(255,255,255,.1)}
.bgrn{background:rgba(34,197,94,.15);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.bsm{padding:.5rem .9rem;font-size:.72rem}
.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:rip .5s linear;background:rgba(255,255,255,.25);pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}

.badge{display:inline-flex;align-items:center;font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .4rem;border-radius:50px}
.bg{background:rgba(34,197,94,.1);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.bb{background:rgba(29,78,216,.12);color:var(--blu2);border:1px solid rgba(29,78,216,.3)}
.br{background:rgba(214,40,40,.12);color:var(--red);border:1px solid rgba(214,40,40,.3)}
.bgr{background:rgba(255,255,255,.05);color:var(--gr);border:1px solid var(--div)}
.ba{background:rgba(245,158,11,.12);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
.empty{text-align:center;padding:2rem 1rem;color:var(--gr)}
.empty i{font-size:2rem;opacity:.3;margin-bottom:.6rem;display:block}
.empty p{font-size:.82rem}
.spin{width:18px;height:18px;border:2px solid var(--div);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.load{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:2rem;color:var(--gr);font-size:.82rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.grid1{display:grid;grid-template-columns:1fr;gap:.75rem}

#toast{position:fixed;top:calc(var(--top)+.7rem);left:1rem;right:1rem;z-index:9999;background:var(--card);border:1px solid var(--div);border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;opacity:0;transform:translateY(-6px);transition:all .25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:.82rem}
#toast.show{opacity:1;transform:translateY(0)}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.g{background:var(--grn)}.r{background:var(--red)}.b{background:var(--blu2)}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-head">
      <div class="auth-logo">IMPERSIL<span class="r">V</span><span class="b">A</span></div>
      <div class="auth-sub">Área de Cliente</div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab on" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchTab('registar')">Criar Conta</div>
    </div>
    <div class="auth-body">
      <div class="auth-form on" id="formLogin">
        <label class="fi-label">Email ou Telefone</label>
        <input class="fi" type="text" id="lContact" placeholder="email@exemplo.com ou +244...">
        <label class="fi-label">Senha</label>
        <div style="position:relative">
          <input class="fi" type="password" id="lSenha" placeholder="A tua senha" style="padding-right:2.8rem">
          <button onclick="togglePass('lSenha')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gr);cursor:pointer;font-size:.85rem"><i class="fa-solid fa-eye" id="lSenhaEye"></i></button>
        </div>
        <div class="auth-err" id="loginErr"></div>
        <button class="auth-btn" id="loginBtn" onclick="doLogin()"><i class="fa-solid fa-unlock-keyhole"></i> ENTRAR</button>
        <div class="auth-help">
          Ainda não tens conta? <a onclick="switchTab('registar')">Cria uma agora</a><br>
          Tens um código de projecto? <a onclick="switchTab('registar')">Regista-te e liga-o</a>
        </div>
      </div>
      <div class="auth-form" id="formRegistar">
        <label class="fi-label">Nome Completo</label>
        <input class="fi" type="text" id="rNome" placeholder="O teu nome">
        <label class="fi-label">Email</label>
        <input class="fi" type="email" id="rEmail" placeholder="email@exemplo.com">
        <div class="or-div">ou</div>
        <label class="fi-label">Telefone / WhatsApp</label>
        <input class="fi" type="tel" id="rTel" placeholder="+244 900 000 000">
        <label class="fi-label">Senha</label>
        <div style="position:relative">
          <input class="fi" type="password" id="rSenha" placeholder="Mín. 6 caracteres" style="padding-right:2.8rem">
          <button onclick="togglePass('rSenha')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gr);cursor:pointer;font-size:.85rem"><i class="fa-solid fa-eye" id="rSenhaEye"></i></button>
        </div>
        <label class="fi-label">Código de Projecto (opcional)</label>
        <input class="fi" type="text" id="rCodigo" placeholder="IMP-XXXXXXXX — se já és cliente" style="text-transform:uppercase;font-family:monospace;letter-spacing:.1em">
        <div class="auth-err" id="registarErr"></div>
        <button class="auth-btn" id="registarBtn" onclick="doRegistar()"><i class="fa-solid fa-user-plus"></i> CRIAR CONTA</button>
        <div class="auth-help">Já tens conta? <a onclick="switchTab('login')">Entra aqui</a></div>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div>
      <div class="hlogo">IMPERSIL<span class="r">V</span><span class="b">A</span><span class="hlogo-s">Área de Cliente</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:.5rem">
      <span class="hname" id="hNome">—</span>
      <button class="hnotif" id="hNotifBtn" onclick="go('notificacoes')">
        <i class="fa-solid fa-bell"></i>
        <span class="hnotif-dot" id="hNotifDot"></span>
      </button>
      <button style="background:none;border:none;color:var(--gr);font-size:.9rem;cursor:pointer" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </div>

  <div class="mc" id="mc"></div>

  <nav class="bn">
    <button class="bni on" onclick="goB(this,'inicio')"><i class="fa-solid fa-house"></i><span>Início</span></button>
    <button class="bni" onclick="goB(this,'projecto')"><i class="fa-solid fa-diagram-project"></i><span>Projecto</span></button>
    <button class="bni" onclick="goB(this,'suporte')"><i class="fa-solid fa-headset"></i><span>Suporte</span><span class="bni-dot" id="bniDotSup"></span></button>
    <button class="bni" onclick="abrirAdminLoja()"><i class="fa-solid fa-gear"></i><span>Gerir Loja</span></button>
    <button class="bni" onclick="goB(this,'mais')"><i class="fa-solid fa-ellipsis"></i><span>Mais</span></button>
  </nav>
</div>

<div id="toast"><div class="tdot" id="td"></div><span id="tm"></span></div>

<script>
var API = 'https://impersilva-ao.3miliosilva.workers.dev';
var _token = '';
var _user = null;
var _cli = null;
var _ttimer;

document.addEventListener('click', function(e) {
  var btn = e.target.closest('.btn, .auth-btn');
  if (!btn) return;
  var r = document.createElement('span');
  r.className = 'ripple';
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height);
  r.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(function(){ r.remove(); }, 600);
});

function toast(msg, type) {
  if (!type) type = 'success';
  var el=document.getElementById('toast'), dot=document.getElementById('td');
  document.getElementById('tm').textContent = msg;
  dot.className = 'tdot '+(type==='success'?'g':type==='error'?'r':'b');
  el.className = 'show';
  clearTimeout(_ttimer);
  _ttimer = setTimeout(function(){ el.className=''; }, 3200);
}

function timeAgo(d) {
  if (!d) return '';
  var diff = Date.now()-new Date(d).getTime();
  var m = Math.floor(diff/60000);
  if (m<1) return 'agora'; if (m<60) return m+'m';
  var h = Math.floor(m/60);
  if (h<24) return h+'h'; return Math.floor(h/24)+'d';
}
function formatKz(v) {
  if (!v && v!==0) return '—';
  return new Intl.NumberFormat('pt-AO').format(v) + ' Kz';
}
function parseEtapas(raw) {
  if (!raw) return [];
  if (typeof raw==='object') return raw;
  try { return JSON.parse(raw); } catch(e) { return []; }
}
function estadoCls(e) {
  return e==='concluido'?'e-ok':e==='revisao'?'e-rev':e==='pausado'?'e-pau':'e-prog';
}
function estadoLabel(e) {
  var m={em_progresso:'Em Progresso',revisao:'Em Revisão',concluido:'Concluído',pausado:'Pausado'};
  return m[e]||e;
}
function togglePass(id) {
  var inp = document.getElementById(id);
  var ico = document.getElementById(id+'Eye');
  if (inp.type==='password') { inp.type='text'; if(ico) ico.className='fa-solid fa-eye-slash'; }
  else { inp.type='password'; if(ico) ico.className='fa-solid fa-eye'; }
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(function(t,i){ t.classList.toggle('on', (i===0&&tab==='login')||(i===1&&tab==='registar')); });
  document.querySelectorAll('.auth-form').forEach(function(f){ f.classList.remove('on'); });
  document.getElementById(tab==='login'?'formLogin':'formRegistar').classList.add('on');
  document.getElementById('loginErr').textContent='';
  document.getElementById('registarErr').textContent='';
}
document.getElementById('lSenha').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('rSenha').addEventListener('keydown', function(e){ if(e.key==='Enter') doRegistar(); });
document.getElementById('rCodigo').addEventListener('input', function(){ this.value=this.value.toUpperCase(); });

async function doLogin() {
  var contact = document.getElementById('lContact').value.trim();
  var senha = document.getElementById('lSenha').value;
  if (!contact || !senha) { document.getElementById('loginErr').textContent='Preenche todos os campos'; return; }
  var btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<div class="spin"></div> A entrar...';

function saveSession(data) {

function doLogout() {

    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && data.user) { _user=data.user; _cli=data.cliente; startApp(); }
      else { localStorage.removeItem('imp_cli_tok'); }
    }).catch(function(){});
}

async function cliGet(path) {
  var r = await fetch(API+path, { headers:{'X-Cliente-Token':_token} });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function cliPost(path, data) {
  var r = await fetch(API+path, {
    method:'POST', headers:{'Content-Type':'application/json','X-Cliente-Token':_token},
    body:JSON.stringify(data)
  });
  var j = await r.json();
  if (!r.ok) throw new Error(j.erro||r.status);
  return j;
}

      html+='<div class="card" style="border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04)">'+
        '<div class="ct" style="color:var(--amb)"><i class="fa-solid fa-clock"></i> '+pend.length+' pagamento'+(pend.length!==1?'s':'')+' pendente'+(pend.length!==1?'s':'')+'</div>';
      pend.forEach(function(f){
        html+='<div class="fin-item">'+
          '<div class="fin-top"><div class="fin-desc">'+f.descricao+'</div><div class="fin-val" style="color:var(--amb)">'+formatKz(f.valor)+'</div></div>'+
          '<div class="fin-meta"><span class="badge ba">pendente</span>'+(f.data_venc?'<span style="font-size:.65rem;color:var(--gr)">Vence: '+f.data_venc+'</span>':'')+
          '<a href="https://wa.me/244954288128?text=Olá!+Quero+regularizar+o+pagamento+de+'+encodeURIComponent(f.descricao)+'" target="_blank" class="btn bgh bsm" style="margin-left:auto"><i class="fa-brands fa-whatsapp"></i></a>'+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    }
    var pagos = data.filter(function(f){ return f.estado==='pago'; });
    if (pagos.length) {
      html+='<div class="card"><div class="ct"><i class="fa-solid fa-circle-check" style="color:var(--grn)"></i> Pagamentos realizados</div>';
      pagos.forEach(function(f){
        html+='<div class="fin-item">'+
          '<div class="fin-top"><div class="fin-desc">'+f.descricao+'</div><div class="fin-val">'+formatKz(f.valor)+'</div></div>'+
          '<div class="fin-meta"><span class="badge bg">pago</span>'+(f.data_pago?'<span style="font-size:.65rem;color:var(--gr)">'+f.data_pago+'</span>':'')+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    }
    el.innerHTML = html;
  } catch(e) { document.getElementById('finC').innerHTML='<div class="empty"><p>Erro ao carregar</p></div>'; }
}

async function rMensagens() {
  document.getElementById('mc').innerHTML =
    '<div class="ph"><div class="pt">Men<span class="r">sagens</span></div></div>'+
    '<div id="msgsC" class="msg-wrap" style="margin-bottom:1rem"><div class="load"><div class="spin"></div> A carregar...</div></div>'+
    '<div class="card" style="position:sticky;bottom:calc(var(--bot)+.5rem)">'+
      '<div style="display:flex;gap:.5rem">'+
        '<input class="fi" type="text" id="msgTxt" placeholder="Escreve uma mensagem..." style="margin:0;flex:1">'+
        '<button class="btn bred" onclick="enviarMsg()"><i class="fa-solid fa-paper-plane"></i></button>'+
      '</div>'+
    '</div>';
  if (!_cli||!_cli.id) { document.getElementById('msgsC').innerHTML='<div class="empty"><i class="fa-solid fa-comments"></i><p>Sem projecto ligado</p></div>'; return; }
  try {
    var data = await cliGet('/api/minha-area/mensagens');
    var el = document.getElementById('msgsC');
    if (!data.length) { el.innerHTML='<div class="empty"><i class="fa-solid fa-comments"></i><p>Sem mensagens ainda. Escreve a primeira!</p></div>'; return; }
    var html='';
    data.slice().reverse().forEach(function(m){
      html+='<div class="msg '+(m.remetente==='cliente'?'cli':'emp')+'">'+
        m.mensagem+
        '<div class="msg-meta">'+(m.remetente==='cliente'?'Tu':'IMPERSILVA')+' • '+timeAgo(m.criado_em)+'</div>'+
      '</div>';
    });
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  } catch(e) { document.getElementById('msgsC').innerHTML='<div class="empty"><p>Erro ao carregar</p></div>'; }
}
async function enviarMsg() {
  var txt = document.getElementById('msgTxt').value.trim();
  if (!txt) return;
  if (!_cli||!_cli.id) { toast('Sem projecto ligado','error'); return; }
  try {
    await cliPost('/api/minha-area/mensagens', {mensagem:txt});
    document.getElementById('msgTxt').value='';
    rMensagens();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}
document.addEventListener('keydown', function(e){
  var inp = document.getElementById('msgTxt');
  if (inp && document.activeElement===inp && e.key==='Enter') enviarMsg();
});

function copyCode(txt) {
  navigator.clipboard.writeText(txt).then(function(){ toast('Código copiado!'); });
}

async function ligarProjecto() {
  var codigo = document.getElementById('linkCode').value.trim().toUpperCase();
  if (!codigo) { toast('Insere o código','error'); return; }
  try {
    var r = await fetch(API+'/api/clientes/'+codigo);
    if (!r.ok) { toast('Código não encontrado','error'); return; }
    toast('Projecto ligado! A actualizar...','info');
    setTimeout(function(){ location.reload(); }, 1500);
  } catch(e) { toast('Erro: '+e.message,'error'); }
}
